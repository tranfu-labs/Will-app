# Will LLM configuration — EXAMPLE.
#
# Copy this file to `will.config.toml` (which is git-ignored) and fill in your
# key + model. With `enabled = false` (or no file at all) Will runs the fully
# deterministic loop and makes no network calls — that is the default.
#
#   cp will.config.example.toml will.config.toml
#   # then edit will.config.toml and set enabled = true + your api_key + model
#
# Env vars override this file when set: WILL_LLM_ENABLED, OPENAI_API_KEY,
# ANTHROPIC_API_KEY (wins for provider = "anthropic"), WILL_LLM_MODEL,
# WILL_LLM_PROVIDER, WILL_LLM_BASE_URL.

[llm]
enabled = false              # flip to true to allow provider-backed adapters
provider = "openai"          # "openai" | "anthropic"
api_key = ""
model = "gpt-5"              # e.g. "claude-sonnet-5" for provider = "anthropic"
base_url = ""                # optional endpoint override; "" = provider default
max_output_tokens = 1024     # cap per LLM call

# R0 read-only delegation to a coding-harness CLI (also drives the W2 campaign
# --worker claude/codex research path). Off by default: with enabled = false or
# command = "" no subprocess ever starts and task runs fail with an explicit
# message. Env vars override: WILL_DELEGATION_ENABLED, WILL_DELEGATION_HARNESS,
# WILL_DELEGATION_COMMAND, WILL_DELEGATION_ROOT.
[delegation]
enabled = false              # manual gate; flip to true to allow harness runs
harness = "claude"           # claude | codex
command = ""                 # CLI entrypoint, e.g. "claude"; empty = inactive
root = ""                    # restricted root the harness may run in, e.g. the repo path
request_timeout = 600.0      # seconds per delegated task run (research-grade)
