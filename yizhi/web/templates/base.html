<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>yizhi 面板 — {{ page }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body data-page="{{ page }}">
  <header>
    <div class="brand">yizhi <span class="muted">观测面板</span></div>
    <nav>
      <a href="/" class="{{ 'active' if page == 'now' else '' }}">当前状态</a>
      <a href="/chat" class="{{ 'active' if page == 'chat' else '' }}">对话</a>
      <a href="/tasks" class="{{ 'active' if page == 'tasks' else '' }}">任务历史</a>
      <a href="/timeline" class="{{ 'active' if page == 'timeline' else '' }}">事件流</a>
      <a href="/deliverables" class="{{ 'active' if page == 'deliverables' else '' }}">交付物</a>
      <a href="/approvals" class="{{ 'active' if page == 'approvals' else '' }}">审批</a>
    </nav>
    <div class="live"><span id="sse-dot" class="dot off"></span><span id="sse-label" class="muted">连接中…</span></div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="muted">只读观测面 · 审批经渠道 inbox 送达 will loop · 本面板不发起任何 run</footer>
  <script src="/static/app.js"></script>
</body>
</html>
