{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-head">
    <h2>事件流</h2>
    <form method="get" action="/timeline" class="filter">
      <select name="type" onchange="this.form.submit()">
        <option value="">全部类型</option>
        {% for t in event_types %}
        <option value="{{ t }}" {{ 'selected' if t == selected_type else '' }}>{{ t }}</option>
        {% endfor %}
      </select>
      <noscript><button type="submit">过滤</button></noscript>
    </form>
  </div>
  {% if not events %}
  <p class="muted empty">没有事件。事件库为空或该类型尚未发生。</p>
  {% else %}
  <table>
    <thead><tr><th>时间</th><th>类型</th><th>对象</th><th>摘要</th></tr></thead>
    <tbody id="event-rows">
      {% for e in events %}
      <tr>
        <td class="mono">{{ e.ts[:19] }}</td>
        <td><span class="badge ev">{{ e.type }}</span></td>
        <td class="mono muted">{{ e.aggregate_type }}</td>
        <td class="summary">{{ e.summary }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% endif %}
</div>
{% endblock %}
